name: Daily Job Alert Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # Midnight UTC time i.e. 5pm PST. Gives a 2hour buffer in case of server load issues. 
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Write token.json
        run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Write .env
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "GMAIL_USER=${{ secrets.GMAIL_USER }}" >> .env
          echo "GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}" >> .env
          echo "GROQ_MODEL=llama-3.3-70b-versatile" >> .env
          echo "GROQ_CALL_DELAY=35" >> .env
          echo "MIN_FIT_SCORE=6" >> .env

      - name: Run pipeline
        run: python3 main.py
